    <script>
      const input = document.getElementById('date-input');
      const datepicker = new TheDatepicker.Datepicker(input);
      datepicker.options.setTitle("Which week to look at?");
      const todaysDate = new Date();
      //getMonth is indexed at 0 so add 1 for formatting...
      const dateFormatToday = (todaysDate.getFullYear() + "-" +
        (todaysDate.getMonth() + 1) + "-" + todaysDate.getDate()
      ).toString();
      datepicker.options.setInitialDate(dateFormatToday);
      datepicker.options.onSelect(function (event, day, previousDay) {
        console.log(day);
      });
      datepicker.options.setInputFormat("Y-m-j");
      datepicker.render(); 
      
    </script>
