<!---PAGE CSS STYLINGS--->
<style>
html, body, .glslCanvas, .theMainBit, .titlebar, .navbutton{
  cursor: url("cursor/hand1.ico"), pointer;
}
@font-face{
	font-family: 'Inter';
	src: url(fonts/InterThin24.ttf);
}
.theMainBit{
  background-color: #f3d7fa;
    font-family: 'Inter';
    justify-content: center;
    align-content: center;
    overflow-y: hidden;
    overflow-x: hidden;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 2.2);
}
.glslCanvas{
  image-rendering: auto;
	position: fixed;
	left: 0px;
	top: 0px;
		display: block;
		width: 100%;
		height: 100%;
		z-index: -1;
}
.titleBlock{
    border: 1px solid transparent;
	  border-radius: 10px;
    box-shadow: 5px 4px 5px black;
    margin-top: -25px;
    margin-left: 15%;
    margin-right: 15%;
    text-shadow:
    1px 1px 2px black,
    0 0 1em grey,
    0 0 0.2em darkgray;
    background: white;
    color: rgb(0, 0, 0);
    min-width: 200px;
    app-region: drag;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 2.2);
}
.titlebar{
  background-image: none;
  margin-left: 0px;
  margin-right: 0px;
  margin-top: 0px;
  border: none;
  border-radius: 0px;
  display: block;
  max-height: 24px;
  padding: 1%;
}
</style>

<!---STYLING FOR HELPER, BLOCKS AND WRAPPERS ETC!-->
<style>

.daySlice{
  align-content: left;
  text-align: left;
  border: 2px ridge rgba(186, 109, 238, 0.6);
  border-radius: 10px;
  min-height: 30px;
  max-height: 200px;
  background-color: #EEEEEE;
  box-shadow: 0 0 10px #00000033;
  overflow: hidden;
}
.insideWrapperTopBar{
  border: 1px solid purple;
  border-radius: 10px;
}
.daysOfWeekWrapper{
  padding: 1%;
  font-size: 20px;

  max-height: 80vh;
  overflow: scroll;
}
::-webkit-scrollbar {
    display: none;
}
#centerScreenBlockWrapper{
  align-content: center;
  text-align: center;
  display: grid;
  word-wrap: break-word;
  padding: 1%;
  border: 2px solid #FFFFFF;
  border-radius: 20px;
  background-color: #EEEEEE;
  box-shadow: 0 0 3px #00000033;
  max-height: 77vh;
  overflow-y: scroll;
} 
.helperDaemon{
  margin-left: 15px;
  background: black;
  color: white;
  box-shadow: 1px 1px white;
}
.helperDaemon::before{
  content: "ⓘ ";
}
.helperDaemon:hover{
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 2.2);
  border: none;
  transform:  scale(1.03);
  translate: -1px -1px;

  background: white;
  color: black;
}
@keyframes l6 {
    100% {inset:0}
}
</style>
